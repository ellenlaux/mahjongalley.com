# Static site + two functions:
#   invite-preview — serves /join/* and /invite/* with per-table OG tags
#   og-image       — renders the per-table 1200x630 preview card PNG
# Routing to the functions lives in _redirects (rewrites take precedence
# over function URLs, so the pretty paths map there explicitly).

[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions.og-image]
  # Native napi module — keep out of the esbuild bundle; Netlify packages
  # it (and its platform binary) from node_modules instead.
  external_node_modules = ["@resvg/resvg-js"]
