  <style>
    @font-face {
      font-family: 'TAY Barro';
      src: url('/assets/fonts/TAYBarro.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Inter';
      src: url('/assets/fonts/Inter-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Inter';
      src: url('/assets/fonts/Inter-SemiBold.ttf') format('truetype');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Inter';
      src: url('/assets/fonts/Inter-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    :root {
      --cream: #F2E8D5;
      --navy: #1A1A2E;
      --cobalt: #536AFA;
      --dim: #5A5F72;
      --card: #FFFFFF;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    [hidden] { display: none !important; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--cream);
      color: var(--navy);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      text-align: center;
      padding: 8px 0 24px;
    }
    .tile-img {
      width: 168px;
      height: auto;
      margin-bottom: 20px;
    }
    .logo {
      display: block;
      width: 250px;
      max-width: 85%;
      height: auto;
      margin: 0 auto;
      color: var(--navy);
    }
    .invite-headline { font-size: 26px; font-weight: 700; letter-spacing: -0.3px; margin-top: 16px; }
    .sub { color: var(--dim); font-size: 15px; line-height: 1.5; margin-top: 40px; }
    .sub .tagline {
      display: block;
      font-family: 'TAY Barro', 'Inter', -apple-system, sans-serif;
      font-weight: normal;
      font-size: 21px;
      line-height: 1.25;
      color: var(--navy);
      margin-bottom: 6px;
    }
    .sub .tagline s { text-decoration-thickness: 2px; }
    .code-label {
      margin-top: 28px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dim);
    }
    .code {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: 8px;
      margin-top: 6px;
      padding-left: 8px; /* optically recenter the letterspaced text */
      user-select: all;
      -webkit-user-select: all;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      margin-top: 14px;
    }
    .btn-primary { background: var(--cobalt); color: #fff; }
    .btn-secondary { background: rgba(83,106,250,0.18); color: var(--navy); }
    .buttons { margin-top: 28px; }
    .hint { color: var(--dim); font-size: 13px; line-height: 1.5; margin-top: 20px; }
    .footer { margin-top: 36px; }
    .footer a { color: var(--cobalt); font-size: 13px; font-weight: 600; text-decoration: none; }
    .footer-sep { color: var(--dim); font-size: 13px; margin: 0 6px; }
  </style>

  <script>
    // /join/ABC123 (6-char table code) or /invite/ABCD2345 (8-char friend
    // code). Served via the 404 fallback, so parse the live path.
    (function () {
      var m = location.pathname.match(/^\/(join|invite)\/([A-Za-z0-9]{4,12})\/?$/);
      if (!m) return;
      var kind = m[1];
      var code = m[2].toUpperCase();

      var headline = document.getElementById('headline');
      headline.textContent =
        kind === 'join' ? "You're invited to a table" : "You're invited to play";
      headline.hidden = false;
      if (kind === 'invite') {
        document.getElementById('code-label').textContent = 'Friend code';
      }
      document.getElementById('subline').textContent =
        kind === 'join'
          ? 'A friend saved you a seat on Mahjong Alley.'
          : "Join a friend on Mahjong Alley — you'll be connected automatically.";

      document.getElementById('code').textContent = code;
      document.getElementById('invite').hidden = false;
      var hint = document.getElementById('hint');
      hint.textContent =
        kind === 'join'
          ? 'Have the app already? Tap “Open in the app”, or type the code on the Join a table screen. New here? Get the app first — the code will be waiting in this message.'
          : 'Have the app already? Tap “Open in the app” and you’ll be connected automatically. New here? Get the app first, then tap this link again — you’ll be friends as soon as you’re signed in.';
      hint.hidden = false;

      var open = document.getElementById('open-app');
      open.href = 'mahjong://' + kind + '/' + code;
      open.hidden = false;
    })();
  </script>
